name: Build and Push to ECR

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Images
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: st6/project-ecr
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          # FastAPI 빌드/푸시
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:fastapi-v$SHORT_SHA ./fastapi
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:fastapi-v$SHORT_SHA
          
          # Nginx 빌드/푸시
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:nginx-v$SHORT_SHA ./nginx
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:nginx-v$SHORT_SHA

      - name: Update Kubernetes Manifest
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          # 세훈님의 단일 ECR 리포지토리 패턴에 맞춰 정확히 치환
          # infra-project.yaml 내의 이미지 주소를 업데이트합니다.
          sed -i "s|project-ecr:fastapi.*|project-ecr:fastapi-v$SHORT_SHA|g" ./manifests/infra-project.yaml
          sed -i "s|project-ecr:nginx.*|project-ecr:nginx-v$SHORT_SHA|g" ./manifests/infra-project.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add ./manifests/infra-project.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            git commit -m "Auto-deploy: update images to v$SHORT_SHA [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi